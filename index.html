<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="A fully-featured Online Examination System supporting MCQ, True/False, and Descriptive questions with real-time timers, auto-grading, and merit lists.">
    <meta name="theme-color" content="#6366f1">
    <title>ExamSphere — Online Examination System</title>
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/admin.css">
    <link rel="stylesheet" href="css/student.css">
    <link rel="stylesheet" href="css/exam.css">
</head>
<body>
    <div id="toast-container"></div>
    <div id="app"></div>

    <!-- Data Structures (loaded first) -->
    <script src="js/structures/Stack.js"></script>
    <script src="js/structures/Queue.js"></script>

    <!-- OOP Models -->
    <script src="js/models/Question.js"></script>
    <script src="js/models/Exam.js"></script>
    <script src="js/models/Student.js"></script>
    <script src="js/models/ExamAttempt.js"></script>
    <script src="js/models/Result.js"></script>

    <!-- Core Services -->
    <script src="js/core/SortUtils.js"></script>
    <script src="js/core/ExamManager.js"></script>

    <!-- UI Layer -->
    <script src="js/ui/Toast.js"></script>
    <script src="js/ui/AdminUI.js"></script>
    <script src="js/ui/StudentUI.js"></script>
    <script src="js/ui/ExamUI.js"></script>

    <!-- Seed Data (runs before app if localStorage is empty) -->
    <script src="js/seed.js"></script>
    <!-- App Entry Point -->
    <script src="js/app.js"></script>
</body>
</html>
